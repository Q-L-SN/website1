<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation - benchpoll</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/censor.css" />

<body>
